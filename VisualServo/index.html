<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Servo Arm Visualizer</title>
        <link href="./style.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <div class="container">
            <h1>Servo Speed Visualizer</h1>
            <h3>By @Bugamashoo</h3>
            <div class="config-panel">
                <div class="config-row">
                    <div class="config-group">
                        <label for="speed">Speed (sec/60°):</label>
                        <input type="number" id="speed" value="0.5" step="0.1" min="0.1" max="60" />
                    </div>

                    <div class="config-group">
                        <label for="sweep">Sweep Angle (°):</label>
                        <input type="number" id="sweep" value="60" step="15" min="15" max="360" />
                    </div>

                    <div class="config-group">
                        <label>Easing:</label>
                        <div class="glass-select" id="easingSelect" data-value="linear">
                            <button class="glass-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                                <span class="glass-select-label">Linear</span>
                                <svg class="glass-select-chevron" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                            </button>
                            <div class="glass-select-panel" role="listbox">
                                <button class="glass-select-option" data-value="off"     type="button" role="option">50% Load</button>
                                <button class="glass-select-option selected" data-value="linear" type="button" role="option">Linear</button>
                                <button class="glass-select-option" data-value="cubic"   type="button" role="option">Cubic</button>
                            </div>
                        </div>
                    </div>

                    <button class="update-btn" onclick="updateConfiguration()">Update Config</button>
                </div>

                <div class="config-row">
                    <div class="config-group">
                        <label>Actual Duration:</label>
                        <span class="duration-display" id="durationDisplay">0.35 sec</span>
                    </div>

                    <div class="config-group">
                        <label>Movement:</label>
                        <span class="info-display" id="movementDisplay">0° ↔ 60° (continuous)</span>
                    </div>
                </div>

                <div class="config-row">
                    <div class="controls">
                        <button class="btn-primary" id="startBtn" onclick="startAnimation()">Start Animation</button>
                        <button class="btn-danger" id="stopBtn" onclick="stopAnimation()" disabled>Stop</button>
                        <button class="btn-secondary" id="resetBtn" onclick="resetAnimation()">Reset</button>
                    </div>
                </div>

                <div class="status" id="status">Ready</div>
            </div>

            <div class="canvas-container">
                <canvas id="servoCanvas" width="800" height="600"></canvas>
            </div>
        </div>

        <script>
            // Global variables
            let canvas, ctx;
            let isAnimating = false;
            let currentAngle = 0;
            let speedPer60Deg = 2.0;
            let sweepAngle = 60;
            let easingMode = "linear";
            let animationId = null;

            // Animation timing
            let animationStartTime = 0;
            let cycleCount = 0;
            let isGoingForward = true;

            // Canvas setup
            window.addEventListener("load", function () {
                canvas = document.getElementById("servoCanvas");
                ctx = canvas.getContext("2d");

                // Set up high DPI canvas
                setupCanvas();

                // Add Enter key listeners
                document.getElementById("speed").addEventListener("keypress", function (e) {
                    if (e.key === "Enter") updateConfiguration();
                });

                document.getElementById("sweep").addEventListener("keypress", function (e) {
                    if (e.key === "Enter") updateConfiguration();
                });

                // Initial setup
                updateConfiguration();
                drawServoArm(0);
            });

            function setupCanvas() {
                if (!canvas) return; // Safety check

                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                canvas.style.width = rect.width + "px";
                canvas.style.height = rect.height + "px";
            }

            function getCanvasDimensions() {
                if (!canvas) return { width: 800, height: 600, centerX: 400, centerY: 300 };

                const dpr = window.devicePixelRatio || 1;
                return {
                    width: canvas.width / dpr,
                    height: canvas.height / dpr,
                    centerX: canvas.width / (2 * dpr),
                    centerY: canvas.height / (2 * dpr)
                };
            }

            function getOptimalScale() {
                const dims = getCanvasDimensions();
                // Calculate scale based on canvas size, ensuring the visualization fits with margin
                const margin = 60; // Leave margin for text and labels
                const availableWidth = dims.width - 2 * margin;
                const availableHeight = dims.height - 2 * margin;

                // The servo arm extends 1.5 units, and we want some extra space for the arc
                const maxExtent = 2.2; // Maximum extent of our drawing

                const scaleX = availableWidth / (2 * maxExtent);
                const scaleY = availableHeight / (2 * maxExtent);

                // Use the smaller scale to ensure everything fits
                return Math.min(scaleX, scaleY, 120); // Cap at 120 for very large canvases
            }

            function getActualDuration() {
                return (sweepAngle / 60.0) * speedPer60Deg;
            }

            function updateConfiguration() {
                const speedInput = document.getElementById("speed");
                const sweepInput = document.getElementById("sweep");
                const easingSelect = document.getElementById("easingSelect");

                // Validate inputs
                const newSpeed = parseFloat(speedInput.value);
                const newSweep = parseFloat(sweepInput.value);

                if (isNaN(newSpeed) || newSpeed <= 0 || newSpeed > 60) {
                    alert("Speed must be between 0.1 and 60 seconds per 60°");
                    return;
                }

                if (isNaN(newSweep) || newSweep <= 0 || newSweep > 360) {
                    alert("Sweep angle must be between 1° and 360°");
                    return;
                }

                speedPer60Deg = newSpeed;
                sweepAngle = newSweep;
                easingMode = easingSelect.dataset.value;

                // Update displays
                const actualDuration = getActualDuration();
                document.getElementById("durationDisplay").textContent = `${actualDuration.toFixed(2)} sec`;
                document.getElementById("movementDisplay").textContent = `0° ↔ ${sweepAngle}° (continuous)`;

                if (isAnimating) {
                    document.getElementById("status").textContent =
                        `Updated! Animating ${sweepAngle}° back and forth every ${actualDuration.toFixed(2)} seconds...`;
                } else {
                    document.getElementById("status").textContent =
                        `Configuration updated: ${sweepAngle}° in ${actualDuration.toFixed(2)}s`;
                }

                // Redraw canvas
                drawServoArm(currentAngle);
            }

            function applyEasing(t) {
                if (t <= 0) return 0;
                if (t >= 1) return 1;

                switch (easingMode) {
                    case "linear":
                        return t;

                    case "cubic":
                        // Cubic ease-in-out
                        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                    case "off":
                    default:
                        // 50% Load Estimate - Original servo easing
                        return servoEasing(t);
                }
            }

            function servoEasing(t) {
                if (t <= 0) return 0;
                if (t >= 1) return 1;

                // Use the configured speed per 60 degrees to determine easing characteristics
                let sharpness;
                if (speedPer60Deg < 0.5) {
                    sharpness = 10; // Very fast speed setting
                } else if (speedPer60Deg < 1.0) {
                    sharpness = 8; // Fast speed setting
                } else if (speedPer60Deg < 2.0) {
                    sharpness = 8; // Medium speed setting (enhanced)
                } else {
                    sharpness = 5.5; // Slow speed setting (enhanced)
                }

                // Modified sigmoid with adjustable sharpness
                const sigmoid = 1 / (1 + Math.exp(-sharpness * (t - 0.5)));
                const normalizer = 1 / (1 + Math.exp(-sharpness / 2)) - 1 / (1 + Math.exp(sharpness / 2));
                return (sigmoid - 1 / (1 + Math.exp(sharpness / 2))) / normalizer;
            }

            function drawServoArm(angle) {
                if (!canvas || !ctx) return; // Safety check

                const dims = getCanvasDimensions();
                const scale = getOptimalScale();

                // Clear canvas
                ctx.clearRect(0, 0, dims.width, dims.height);

                // Set up coordinate system (center of canvas)
                ctx.save();
                ctx.translate(dims.centerX, dims.centerY);
                ctx.scale(scale, -scale); // Flip Y axis for mathematical coordinates

                // Draw servo base (circle)
                ctx.fillStyle = "#6D28D9";
                ctx.beginPath();
                ctx.arc(0, 0, 0.1, 0, 2 * Math.PI);
                ctx.fill();

                // Draw movement range arc
                const maxAngleRad = (Math.min(sweepAngle, 180) * Math.PI) / 180;
                ctx.strokeStyle = "rgba(109, 40, 217, 0.30)";
                ctx.lineWidth = 0.025;
                ctx.beginPath();
                ctx.arc(0, 0, 1.2, 0, maxAngleRad);
                ctx.stroke();

                // Draw angle markers
                ctx.fillStyle = "#6D28D9";
                const fontSize = Math.max(0.22, (0.01 * scale) / 4); // Scale font size inversely with scale
                ctx.font = `${fontSize}px Arial`;
                ctx.textAlign = "center";
                ctx.scale(1, -1); // Flip text back
                ctx.fillText("0°", 1.05, fontSize * 0.4);

                // End angle marker
                const endAngleRad = (sweepAngle * Math.PI) / 180;
                const endX = 1.1 * Math.cos(endAngleRad);
                const endY = 1.1 * Math.sin(endAngleRad);

                if (sweepAngle <= 90) {
                    ctx.fillText(`${sweepAngle}°`, endX, -endY + fontSize * 0.8);
                } else {
                    ctx.textAlign = "right";
                    ctx.fillText(`${sweepAngle}°`, endX - 0.05, -endY);
                }

                ctx.scale(1, -1); // Flip back for drawing

                // Draw servo arm
                const angleRad = (angle * Math.PI) / 180;
                const armLength = 2;
                const armEndX = armLength * Math.cos(angleRad);
                const armEndY = armLength * Math.sin(angleRad);

                ctx.strokeStyle = "#6D28D9";
                ctx.lineWidth = 0.05;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(armEndX, armEndY);
                ctx.stroke();

                // Draw arm end marker
                ctx.fillStyle = "#6D28D9";
                ctx.beginPath();
                ctx.arc(armEndX, armEndY, 0.08, 0, 2 * Math.PI);
                ctx.fill();

                // Draw legend
                ctx.restore();

                // Draw title
                ctx.fillStyle = "#6D28D9";
                const titleFontSize = Math.max(12, 18 * Math.min(dims.width / 800, 1));
                ctx.font = `bold ${titleFontSize}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(`Servo Arm Movement (0° ↔ ${sweepAngle}° Continuous)`, dims.centerX, 30);
            }

            function animateFrame(timestamp) {
                if (!isAnimating) return;

                if (animationStartTime === 0) {
                    animationStartTime = timestamp;
                }

                const elapsed = (timestamp - animationStartTime) / 1000; // Convert to seconds
                const actualDuration = getActualDuration();

                if (elapsed >= actualDuration) {
                    // One direction complete
                    cycleCount++;
                    isGoingForward = cycleCount % 2 === 0;
                    animationStartTime = timestamp;

                    // Small pause between direction changes
                    setTimeout(
                        () => {
                            if (isAnimating) {
                                animationId = requestAnimationFrame(animateFrame);
                            }
                        },
                        Math.min(50, actualDuration * 100)
                    ); // 5% of duration or 50ms max
                    return;
                }

                // Calculate current angle
                const progress = elapsed / actualDuration;
                const easedProgress = applyEasing(progress);

                const startAngle = isGoingForward ? 0 : sweepAngle;
                const endAngle = isGoingForward ? sweepAngle : 0;
                currentAngle = startAngle + (endAngle - startAngle) * easedProgress;

                // Draw the servo arm
                drawServoArm(currentAngle);

                // Continue animation
                animationId = requestAnimationFrame(animateFrame);
            }

            function startAnimation() {
                updateConfiguration(); // Ensure config is current

                if (isAnimating) {
                    stopAnimation();
                }

                isAnimating = true;
                animationStartTime = 0;
                cycleCount = 0;
                isGoingForward = true;

                // Update UI
                document.getElementById("startBtn").disabled = true;
                document.getElementById("stopBtn").disabled = false;

                const actualDuration = getActualDuration();
                document.getElementById("status").textContent =
                    `Animating ${sweepAngle}° back and forth every ${actualDuration.toFixed(2)} seconds...`;

                // Start animation
                animationId = requestAnimationFrame(animateFrame);
            }

            function stopAnimation() {
                isAnimating = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }

                // Update UI
                document.getElementById("startBtn").disabled = false;
                document.getElementById("stopBtn").disabled = true;
                document.getElementById("status").textContent = "Animation stopped";
            }

            function resetAnimation() {
                stopAnimation();
                currentAngle = 0;
                drawServoArm(0);
                document.getElementById("status").textContent = "Reset to starting position";
            }

            // Handle window resize
            window.addEventListener("resize", function () {
                if (canvas && ctx) {
                    setupCanvas();
                    drawServoArm(currentAngle);
                }
            });
        </script>
        <script>
            /* Liquid Glass interactions - panel tilt, button ripple/tilt, ambient ripple */
            (function () {
                var container = document.querySelector('.container');
                var configPanel = document.querySelector('.config-panel');
                var canvasContainer = document.querySelector('.canvas-container');

                function lerp(a, b, t) { return a + (b - a) * t; }

                /* --- Base container tilt --- */
                var cx = 0, cy = 0, tx = 0, ty = 0;
                var running = false;

                function tick() {
                    cx = lerp(cx, tx, 0.08);
                    cy = lerp(cy, ty, 0.08);
                    var moving = Math.abs(cx - tx) > 0.004 || Math.abs(cy - ty) > 0.004
                        || Math.abs(cx) > 0.004 || Math.abs(cy) > 0.004;
                    container.style.setProperty('--light-x', (Math.max(15, Math.min(85, 50 - cy * 12))).toFixed(1) + '%');
                    if (moving) {
                        container.style.transform =
                            'perspective(1400px) rotateX(' + cx.toFixed(3) + 'deg) rotateY(' + cy.toFixed(3) + 'deg)';
                        requestAnimationFrame(tick);
                    } else {
                        container.style.transform = '';
                        running = false;
                    }
                }

                function start() { if (!running) { running = true; requestAnimationFrame(tick); } }

                container.addEventListener('mousemove', function (e) {
                    var r = container.getBoundingClientRect();
                    tx =  ((e.clientY - (r.top  + r.height * 0.5)) / (r.height * 0.5)) * 1;
                    ty = -((e.clientX - (r.left + r.width  * 0.5)) / (r.width  * 0.5)) * 1;
                    start();
                });
                container.addEventListener('mouseleave', function () { tx = 0; ty = 0; start(); });

                /* --- Independent sub-panel tilt (stacks on top of base tilt) --- */
                [configPanel, canvasContainer].forEach(function (panel) {
                    var scx = 0, scy = 0, stx = 0, sty = 0;
                    var sRunning = false;

                    function tickPanel() {
                        scx = lerp(scx, stx, 0.08);
                        scy = lerp(scy, sty, 0.08);
                        var moving = Math.abs(scx - stx) > 0.004 || Math.abs(scy - sty) > 0.004
                            || Math.abs(scx) > 0.004 || Math.abs(scy) > 0.004;
                        if (moving) {
                            panel.style.transform =
                                'perspective(900px) rotateX(' + scx.toFixed(3) + 'deg) rotateY(' + scy.toFixed(3) + 'deg)';
                            requestAnimationFrame(tickPanel);
                        } else {
                            panel.style.transform = '';
                            sRunning = false;
                        }
                    }

                    function startPanel() { if (!sRunning) { sRunning = true; requestAnimationFrame(tickPanel); } }

                    panel.addEventListener('mousemove', function (e) {
                        var r = panel.getBoundingClientRect();
                        stx =  ((e.clientY - (r.top  + r.height * 0.5)) / (r.height * 0.5)) * 1;
                        sty = -((e.clientX - (r.left + r.width  * 0.5)) / (r.width  * 0.5)) * 1;
                        startPanel();
                    });
                    panel.addEventListener('mouseleave', function () { stx = 0; sty = 0; startPanel(); });
                });

                /* Shared ripple spawner - strong=true for buttons, false for ambient */
                function spawnRipple(el, x, y, strong) {
                    var dot = document.createElement('span');
                    var a1 = strong ? 0.65 : 0.14;
                    var a2 = strong ? 0.28 : 0.05;
                    dot.style.cssText =
                        'position:absolute;width:10px;height:10px;border-radius:50%;pointer-events:none;' +
                        'background:radial-gradient(circle,rgba(255,220,255,' + a1 + ') 0%,rgba(190,80,255,' + a2 + ') 55%,transparent 100%);' +
                        'left:' + (x - 5) + 'px;top:' + (y - 5) + 'px;' +
                        'animation:liquidRipple 0.65s ease-out forwards;';
                    el.appendChild(dot);
                    setTimeout(function () { dot.remove(); }, 700);
                }

                /* Custom spin buttons for number inputs */
                document.querySelectorAll('input[type="number"]').forEach(function (inp) {
                    var wrap = document.createElement('span');
                    wrap.className = 'spin-wrap';
                    inp.parentNode.insertBefore(wrap, inp);
                    wrap.appendChild(inp);
                    var btns = document.createElement('span');
                    btns.className = 'spin-btns';
                    var up = document.createElement('button');
                    up.type = 'button'; up.className = 'spin-up'; up.tabIndex = -1; up.setAttribute('aria-label', 'Increase');
                    var dn = document.createElement('button');
                    dn.type = 'button'; dn.className = 'spin-down'; dn.tabIndex = -1; dn.setAttribute('aria-label', 'Decrease');
                    btns.appendChild(up); btns.appendChild(dn); wrap.appendChild(btns);
                    up.addEventListener('click', function () { inp.stepUp(); inp.dispatchEvent(new Event('change', { bubbles: true })); });
                    dn.addEventListener('click', function () { inp.stepDown(); inp.dispatchEvent(new Event('change', { bubbles: true })); });
                });

                /* Custom glass select dropdown */
                document.querySelectorAll('.glass-select').forEach(function (sel) {
                    var trigger  = sel.querySelector('.glass-select-trigger');
                    var panel    = sel.querySelector('.glass-select-panel');
                    var labelEl  = sel.querySelector('.glass-select-label');
                    var opts     = sel.querySelectorAll('.glass-select-option');

                    function openSel() {
                        /* Move panel out of config-panel's compositor layer
                           so backdrop-filter can blur the content behind it */
                        var cont = document.querySelector('.container');
                        if (panel.parentElement !== cont) {
                            cont.appendChild(panel);
                        }
                        var tRect = trigger.getBoundingClientRect();
                        var cRect = cont.getBoundingClientRect();
                        panel.style.top      = (tRect.bottom - cRect.top  + 5) + 'px';
                        panel.style.left     = (tRect.left   - cRect.left    ) + 'px';
                        panel.style.minWidth = tRect.width + 'px';
                        sel.classList.add('open');
                        panel.classList.add('open');
                        trigger.setAttribute('aria-expanded', 'true');
                    }

                    function closeSel() {
                        sel.classList.remove('open');
                        panel.classList.remove('open');
                        trigger.setAttribute('aria-expanded', 'false');
                    }

                    trigger.addEventListener('click', function (e) {
                        e.stopPropagation();
                        panel.classList.contains('open') ? closeSel() : openSel();
                    });

                    opts.forEach(function (opt) {
                        opt.addEventListener('click', function (e) {
                            e.stopPropagation();
                            opts.forEach(function (o) { o.classList.remove('selected'); });
                            opt.classList.add('selected');
                            sel.dataset.value = opt.dataset.value;
                            labelEl.textContent = opt.textContent;
                            closeSel();
                        });
                    });

                    document.addEventListener('click', closeSel);
                });


                document.querySelectorAll('button:not(.spin-up):not(.spin-down):not(.glass-select-option):not(.glass-select-trigger)').forEach(function (btn) {
                    var lastTouchMs = 0;
                    btn.addEventListener('mousemove', function (e) {
                        var r = btn.getBoundingClientRect();
                        btn.style.setProperty('--btn-rx', (((e.clientY - (r.top  + r.height * 0.5)) / (r.height * 0.5)) *  1).toFixed(2) + 'deg');
                        btn.style.setProperty('--btn-ry', (-((e.clientX - (r.left + r.width  * 0.5)) / (r.width  * 0.5)) *  1).toFixed(2) + 'deg');
                    });
                    btn.addEventListener('mouseleave', function () {
                        btn.style.setProperty('--btn-rx', '0deg');
                        btn.style.setProperty('--btn-ry', '0deg');
                    });
                    btn.addEventListener('touchstart', function (e) {
                        lastTouchMs = Date.now();
                        var t = e.touches[0];
                        var r = btn.getBoundingClientRect();
                        spawnRipple(btn, t.clientX - r.left, t.clientY - r.top, true);
                    }, { passive: true });
                    btn.addEventListener('click', function (e) {
                        if (Date.now() - lastTouchMs < 600) return;
                        var r = btn.getBoundingClientRect();
                        spawnRipple(btn, e.clientX - r.left, e.clientY - r.top, true);
                    });
                });

                /* Ambient ripple on non-interactive taps/clicks within the panel */
                var interactiveTags = { BUTTON: 1, A: 1, INPUT: 1, SELECT: 1, TEXTAREA: 1, LABEL: 1, CANVAS: 1 };
                var lastAmbientTouchMs = 0;
                function ambientRipple(clientX, clientY) {
                    var r = container.getBoundingClientRect();
                    if (clientX < r.left || clientX > r.right || clientY < r.top || clientY > r.bottom) return;
                    spawnRipple(container, clientX - r.left, clientY - r.top, false);
                }
                document.addEventListener('touchend', function (e) {
                    if (interactiveTags[e.target.tagName]) return;
                    lastAmbientTouchMs = Date.now();
                    var t = e.changedTouches[0];
                    ambientRipple(t.clientX, t.clientY);
                }, { passive: true });
                document.addEventListener('click', function (e) {
                    if (interactiveTags[e.target.tagName]) return;
                    if (Date.now() - lastAmbientTouchMs < 600) return;
                    ambientRipple(e.clientX, e.clientY);
                });
            }());
        </script>
    </body>
</html>
